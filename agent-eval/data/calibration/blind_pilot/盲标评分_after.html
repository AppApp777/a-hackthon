<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>修复后盲标评分（3条）</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#0a0a0a;color:#e0e0e0;padding-bottom:60px}
.header{background:#1a1a2e;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:2px solid #ff9800}
.header h1{font-size:17px;color:#ffb74d}
.progress{color:#888;font-size:14px}
.progress .done{color:#4caf50;font-weight:bold}
.nav{display:flex;gap:8px}
.nav button{padding:7px 14px;background:#333;color:#fff;border:1px solid #555;border-radius:6px;cursor:pointer;font-size:13px}
.nav button:hover{background:#444}
.nav button.primary{background:#e65100;border-color:#ff6d00}
.nav button:disabled{opacity:.3;cursor:default}
.jump-wrap{background:#111;padding:8px 24px;border-bottom:1px solid #222}
.jump-bar{display:flex;gap:4px;flex-wrap:wrap}
.jump-bar button{width:32px;height:26px;font-size:11px;padding:0;border:1px solid #444;background:#222;color:#aaa;border-radius:4px;cursor:pointer}
.jump-bar button.current{background:#e65100;color:#fff;border-color:#ff6d00}
.jump-bar button.scored{background:#1b3a1b;border-color:#4caf50;color:#4caf50}
.container{max-width:1400px;margin:0 auto;padding:16px 20px;display:grid;grid-template-columns:1fr 360px;gap:16px}
@media(max-width:960px){.container{grid-template-columns:1fr}}
.conversation{background:#111;border-radius:10px;padding:18px;max-height:calc(100vh - 120px);overflow-y:auto}
.scenario-box{background:#16213e;padding:14px;border-radius:8px;margin-bottom:14px;font-size:13px;line-height:1.7}
.scenario-box .lbl{color:#ffb74d;font-weight:bold;margin-right:4px}
.scenario-box details{margin-top:8px}
.scenario-box summary{cursor:pointer;color:#ffb74d;font-size:12px}
.scenario-box pre{color:#bbb;font-size:12px;margin-top:6px;white-space:pre-wrap;line-height:1.6}
.msg{margin:8px 0;padding:10px 14px;border-radius:8px;font-size:13.5px;line-height:1.75}
.msg.assistant{background:#172217;border-left:3px solid #4caf50}
.msg.user{background:#151a2e;border-left:3px solid #42a5f5}
.msg.system{background:#221515;border-left:3px solid #ff9800;font-size:12px;color:#999}
.msg .role-tag{font-size:11px;font-weight:bold;margin-bottom:3px}
.msg .role-tag.assistant{color:#66bb6a}
.msg .role-tag.user{color:#64b5f6}
.msg .role-tag.system{color:#ffb74d}
.msg .content{white-space:pre-wrap;word-break:break-word}
.tool-box{background:#1a1520;margin:5px 0;padding:7px 10px;border-radius:5px;font-size:12px;border-left:2px solid #ab47bc}
.tool-box .tn{color:#ce93d8;font-weight:bold}
.tool-box .td{color:#888;margin-top:2px;word-break:break-all}
.scoring{background:#111;border-radius:10px;padding:18px;max-height:calc(100vh - 120px);overflow-y:auto;position:sticky;top:70px}
.scoring h3{color:#ffb74d;font-size:15px;margin-bottom:12px}
.scoring h4{color:#aaa;font-size:13px;margin:14px 0 8px;border-top:1px solid #222;padding-top:10px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:12.5px;color:#aaa;margin-bottom:4px}
.fld .hint{font-size:10.5px;color:#555}
.fld input,.fld select,.fld textarea{width:100%;padding:8px 10px;background:#1a1a1a;border:1px solid #333;border-radius:5px;color:#e0e0e0;font-size:13px}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:#ffb74d;outline:none}
.fld textarea{height:50px;resize:vertical}
.veto-row{display:flex;gap:8px;align-items:center}
.veto-row select{width:72px;flex-shrink:0}
.veto-row input{flex:1}
.dim-table{width:100%;border-collapse:collapse}
.dim-table td{padding:5px 4px;font-size:12.5px;border-bottom:1px solid #1a1a1a}
.dim-table td:first-child{color:#ccc}
.dim-table td:last-child{width:72px}
.dim-table select{width:100%;padding:5px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#e0e0e0;font-size:13px}
.timer{font-size:11px;color:#555;margin-top:4px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;padding:10px 24px;display:flex;justify-content:space-between;align-items:center;border-top:2px solid #ff9800;z-index:100}
.bottom-bar button{padding:9px 20px;font-size:13px;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.btn-csv{background:#e65100;color:#fff}
.btn-csv:hover{background:#ff6d00}
.note-banner{background:#332200;border:1px solid #ff9800;padding:10px 24px;font-size:13px;color:#ffb74d;text-align:center}
</style>
</head>
<body>

<div class="note-banner">Prompt 修复后重跑的 3 条 trace — 与修复前对比用</div>

<div class="header">
  <h1>修复后盲标 <span class="progress">(<span class="done" id="doneCount">0</span>/3 已评)</span></h1>
  <div class="nav">
    <button id="prevBtn" onclick="go(-1)">&larr; 上一条</button>
    <button id="nextBtn" class="primary" onclick="go(1)">下一条 &rarr;</button>
  </div>
</div>

<div class="jump-wrap"><div class="jump-bar" id="jumpBar"></div></div>

<div class="container">
  <div class="conversation" id="convPanel"></div>
  <div class="scoring">
    <h3>评分 — 对话 #<span id="curIdx">01</span> <span class="timer" id="timerDisplay"></span></h3>
    <div class="fld">
      <label>总分 (0-100) <span class="hint">A=80+ B=60-79 C=40-59 D=20-39 F=0-19</span></label>
      <input type="number" id="f_total" min="0" max="100" placeholder="0-100" oninput="autoGrade();save()">
    </div>
    <div class="fld">
      <label>总评级</label>
      <select id="f_grade" onchange="save()">
        <option value="">--</option><option value="A">A</option><option value="B">B</option>
        <option value="C">C</option><option value="D">D</option><option value="F">F</option>
      </select>
    </div>
    <div class="fld">
      <label>是否触发 Veto</label>
      <div class="veto-row">
        <select id="f_veto" onchange="save()"><option value="">--</option><option value="是">是</option><option value="否">否</option></select>
        <input type="text" id="f_veto_reason" placeholder="原因（如有）" oninput="save()">
      </div>
    </div>
    <h4>7 维度</h4>
    <table class="dim-table">
      <tr><td>任务完成度 <span class="hint">(0-2)</span></td><td><select id="f_d1" onchange="save()"><option value="">-</option><option>0</option><option>1</option><option>2</option></select></td></tr>
      <tr><td>工具/DB 正确性 <span class="hint">(0-2/NA)</span></td><td><select id="f_d2" onchange="save()"><option value="">-</option><option>0</option><option>1</option><option>2</option><option>NA</option></select></td></tr>
      <tr><td>时序正确性 <span class="hint">(0-2)</span></td><td><select id="f_d3" onchange="save()"><option value="">-</option><option>0</option><option>1</option><option>2</option></select></td></tr>
      <tr><td>约束合规 <span class="hint">(0-2)</span></td><td><select id="f_d4" onchange="save()"><option value="">-</option><option>0</option><option>1</option><option>2</option></select></td></tr>
      <tr><td>知识准确性 <span class="hint">(0-2)</span></td><td><select id="f_d5" onchange="save()"><option value="">-</option><option>0</option><option>1</option><option>2</option></select></td></tr>
      <tr><td>安全/隐私 <span class="hint">(0-2)</span></td><td><select id="f_d6" onchange="save()"><option value="">-</option><option>0</option><option>1</option><option>2</option></select></td></tr>
      <tr><td>软质量 <span class="hint">(1-5)</span></td><td><select id="f_d7" onchange="save()"><option value="">-</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select></td></tr>
    </table>
    <h4>补充</h4>
    <div class="fld"><label>关键失败轮次</label><input type="text" id="f_fail_turn" placeholder="如：5" oninput="save()"></div>
    <div class="fld"><label>备注</label><textarea id="f_notes" placeholder="犹豫的地方写下来" oninput="save()"></textarea></div>
  </div>
</div>

<div class="bottom-bar">
  <span style="color:#666;font-size:12px">自动保存 · 关页面不丢</span>
  <div>
    <button class="btn-csv" onclick="exportCSV()">导出 CSV</button>
  </div>
</div>

<script>
let traces=[], current=0, scores={}, auditLog=[];
const FIELDS=['f_total','f_grade','f_veto','f_veto_reason','f_d1','f_d2','f_d3','f_d4','f_d5','f_d6','f_d7','f_fail_turn','f_notes'];
let viewStart=0;

function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
function md(s){
  if(!s)return '';
  const lines=s.split('\n');
  const out=[];
  let inTable=false, tableRows=[];
  for(const line of lines){
    if(/^\s*\|.*\|/.test(line)){tableRows.push(line);inTable=true;continue}
    if(inTable){out.push(renderTable(tableRows));tableRows=[];inTable=false}
    let h=esc(line);
    h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    h=h.replace(/`(.+?)`/g,'<code style="background:#222;padding:1px 4px;border-radius:3px;font-size:12px">$1</code>');
    out.push(h);
  }
  if(tableRows.length) out.push(renderTable(tableRows));
  return out.join('<br>');
}
function renderTable(rows){
  let h='<table style="border-collapse:collapse;margin:8px 0;font-size:13px;width:auto">';
  const data=rows.filter(r=>!/^\s*\|[\s\-:]+\|\s*$/.test(r));
  data.forEach((r,i)=>{
    const cells=r.split('|').filter((_,j,a)=>j>0&&j<a.length-1).map(c=>c.trim());
    const tag=i===0?'th':'td';
    const bg=i===0?'background:#1a1a2e;':'';
    h+='<tr>'+cells.map(c=>`<${tag} style="border:1px solid #333;padding:4px 10px;${bg}">${esc(c)}</${tag}>`).join('')+'</tr>';
  });
  return h+'</table>';
}
function fmtTime(ms){const s=Math.floor(ms/1000);const m=Math.floor(s/60);return m>0?`${m}分${s%60}秒`:`${s}秒`}

async function init(){
  const r=await fetch('traces_after.json');
  traces=await r.json();
  const sv=localStorage.getItem('after_scores_v1');
  if(sv)scores=JSON.parse(sv);
  buildJumpBar();render(0);
}

function buildJumpBar(){
  const bar=document.getElementById('jumpBar');bar.innerHTML='';
  for(let i=0;i<traces.length;i++){
    const b=document.createElement('button');
    b.textContent=String(i+1).padStart(2,'0');
    b.onclick=()=>render(i);
    if(scores[i]&&scores[i].f_total)b.classList.add('scored');
    bar.appendChild(b);
  }
}

function render(idx){
  if(viewStart && scores[current] && scores[current].f_total){
    const elapsed=Date.now()-viewStart;
    if(!scores[current]._time) scores[current]._time=0;
    scores[current]._time+=elapsed;
  }
  current=idx;viewStart=Date.now();
  const t=traces[idx];
  document.getElementById('curIdx').textContent=String(idx+1).padStart(2,'0');
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===traces.length-1;
  const spent=scores[idx]&&scores[idx]._time?scores[idx]._time:0;
  document.getElementById('timerDisplay').textContent=spent?`(已用 ${fmtTime(spent)})`:'';

  let h=`<div class="scenario-box">
    <span class="lbl">场景：</span>${esc(t.scenario)}<br>
    ${t.desc?`<span class="lbl">描述：</span>${esc(t.desc)}<br>`:''}
    ${t.purpose?`<span class="lbl">通话目的：</span>${esc(t.purpose)}<br>`:''}
  </div>`;

  for(const m of t.msgs){
    const rc=(m.role==='agent')?'assistant':m.role;
    const rl=(rc==='assistant'||rc==='agent')?'🤖 Agent':rc==='user'?'👤 用户':'⚙️ 系统';
    h+=`<div class="msg ${rc}"><div class="role-tag ${rc}">[轮次 ${m.turn}] ${rl}</div><div class="content">${md(m.content)||'<i style="color:#555">(空)</i>'}</div>`;
    for(const tc of(m.tools||[])){
      h+=`<div class="tool-box"><span class="tn">📞 ${esc(tc.name)}</span>`;
      if(tc.args)h+=`<div class="td">参数: ${esc(tc.args)}</div>`;
      if(tc.result)h+=`<div class="td">结果: ${esc(tc.result)}</div>`;
      if(tc.error)h+=`<div class="td" style="color:#ef5350">错误: ${esc(tc.error)}</div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`<div style="text-align:center;color:#444;margin:16px;font-size:12px">— 对话结束 (${t.msgs.length} 条消息) —</div>`;
  document.getElementById('convPanel').innerHTML=h;
  document.getElementById('convPanel').scrollTop=0;

  const s=scores[idx]||{};
  for(const f of FIELDS) document.getElementById(f).value=s[f]||'';

  const btns=document.getElementById('jumpBar').children;
  for(let i=0;i<btns.length;i++) btns[i].classList.toggle('current',i===idx);
  updateDone();
}

function save(){
  const s={};
  for(const f of FIELDS) s[f]=document.getElementById(f).value;
  s._time=(scores[current]&&scores[current]._time)||0;
  s._scored_at=new Date().toISOString();
  scores[current]=s;
  localStorage.setItem('after_scores_v1',JSON.stringify(scores));
  buildJumpBar();
  document.getElementById('jumpBar').children[current].classList.add('current');
  updateDone();
}

function autoGrade(){
  const v=parseInt(document.getElementById('f_total').value);
  const g=document.getElementById('f_grade');
  if(isNaN(v))return;
  if(v>=80)g.value='A';else if(v>=60)g.value='B';else if(v>=40)g.value='C';else if(v>=20)g.value='D';else g.value='F';
}

function go(d){if(current+d>=0&&current+d<traces.length)render(current+d)}
function updateDone(){document.getElementById('doneCount').textContent=Object.values(scores).filter(s=>s.f_total).length}

function exportCSV(){
  const hdr='﻿对话编号,总分,评级,veto,veto原因,任务完成度,工具正确性,时序正确性,约束合规,知识准确性,安全隐私,软质量,失败轮次,备注,耗时秒\n';
  let rows='';
  for(let i=0;i<traces.length;i++){
    const s=scores[i]||{};
    const n=String(i+1).padStart(2,'0');
    const sec=s._time?Math.round(s._time/1000):'';
    const vals=[n,s.f_total||'',s.f_grade||'',s.f_veto||'',(s.f_veto_reason||'').replace(/,/g,'，'),
      s.f_d1||'',s.f_d2||'',s.f_d3||'',s.f_d4||'',s.f_d5||'',s.f_d6||'',s.f_d7||'',
      s.f_fail_turn||'',(s.f_notes||'').replace(/,/g,'，').replace(/\n/g,' '),sec];
    rows+=vals.join(',')+'\n';
  }
  dl('人工标注表_after.csv',hdr+rows,'text/csv;charset=utf-8;');
}

function dl(name,content,type){
  const blob=new Blob([content],{type});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='ArrowRight')go(1);
});

init();
</script>
</body>
</html>
