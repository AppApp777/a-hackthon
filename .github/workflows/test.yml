name: Test & Quality Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent-eval/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Ruff format check
        run: python -m ruff format --check agent-eval/

      - name: Ruff lint
        run: python -m ruff check agent-eval/

      - name: Contract tests
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=agent-eval pytest tests/contracts/ -q --maxfail=3

      - name: Unit tests
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=agent-eval pytest tests/unit/ -q --maxfail=3

      - name: Adversarial tests
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=agent-eval pytest tests/adversarial/ -q --maxfail=3

      - name: Coverage report
        run: |
          cd ${{ github.workspace }}
          PYTHONPATH=agent-eval pytest tests/ --cov=agent-eval --cov-branch --cov-report=term-missing --cov-fail-under=0 -q
